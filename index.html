<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="container">
      <h1>My To Do List</h1>

      <!-- INPUT -->
      <div class="input-box">
        <input type="text" id="task-input" placeholder="Add a new task..." />
        <button id="add-btn">Add</button>
      </div>

      <!-- FILTERS -->
      <div class="filters">
        <button class="filter-btn active" id="all-btn">All</button>
        <button class="filter-btn" id="active-btn">Active</button>
        <button class="filter-btn" id="completed-btn">Completed</button>
      </div>

      <!-- TASK LIST -->
      <ul id="task-list"></ul>

      <!-- FOOTER -->
      <div class="footer">
        <span id="task-count">0 tasks remaining</span>
        <button id="clear-btn">Clear Completed</button>
      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
